    ## 4. extraction/assistant_axis.py — Assistant Axis and PCA

    Algorithm (Section 3.1):
    # Contrast vector method (recommended over PC1)
    def compute_assistant_axis(
        assistant_vector: Tensor,   # [d_model]
        role_vectors: list[Tensor], # list of [d_model] (fully role-playing only)
    ) -> Tensor:                    # [d_model], unit-normalized
        mean_roles = stack(role_vectors).mean(dim=0)
        axis = assistant_vector - mean_roles
        return axis / axis.norm()   # L2-normalize

    # Compute at EVERY layer for analysis, then select middle layer for interventions

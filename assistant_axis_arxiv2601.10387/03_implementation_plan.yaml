    ## 5. interventions/capping.py — Activation Capping (Equation 1)

    Core formula (Section 5, Equation 1):
    h ← h − v · min(⟨h, v⟩ − τ, 0)

    def activation_cap_hook(
        h: Tensor,          # post-MLP residual stream [batch, seq_len, d_model]
        v: Tensor,          # Assistant Axis unit vector [d_model]
        tau: float,         # threshold (25th percentile scalar)
    ) -> Tensor:
        proj = (h * v).sum(dim=-1, keepdim=True)      # ⟨h, v⟩, shape [batch, seq_len, 1]
        correction = v * torch.clamp(proj - tau, max=0.0)  # v · min(proj-τ, 0)
        return h - correction

    Calibration (Section 5.1.1):
    def calibrate_cap_threshold(
        model: HookedModel,
        calibration_rollouts: list[str],  # 912,000 samples from role vector extraction
        assistant_axis: Tensor,
        layer: int,
        percentile: float = 25.0,
    ) -> float:
        projections = []
        for rollout in calibration_rollouts:
            act = model.get_mean_response_activation(rollout, layer)  # [d_model]
            proj = (act * assistant_axis).sum().item()
            projections.append(proj)
        return float(np.percentile(projections, percentile))

    Multi-layer application (Section 5.1.2):
    def build_capping_hook(v: Tensor, tau: float, target_layers: range) -> dict:
        # Returns hook functions keyed by layer index
        return {
            layer: lambda h, _: activation_cap_hook(h, v, tau)
            for layer in target_layers
        }
    # Qwen: layers 46–53; Llama: layers 56–71


    ## 6. interventions/steering.py — Additive Activation Steering

    def compute_steering_vector(
        assistant_axis: Tensor,     # [d_model] unit vector
        layer_residual_norm: float, # average post-MLP norm at that layer from LMSYS-CHAT-1M
        alpha: float,               # steering coefficient (positive=toward, negative=away)
    ) -> Tensor:
        return alpha * layer_residual_norm * assistant_axis

    def steering_hook(
        h: Tensor,              # [batch, seq_len, d_model]
        steering_vec: Tensor,   # [d_model]
    ) -> Tensor:
        return h + steering_vec.unsqueeze(0).unsqueeze(0)  # broadcast

    Compute layer residual norm:
    def compute_layer_norm(model, lmsys_samples: list[str], layer: int) -> float:
        norms = []
        for sample in lmsys_samples:
            act = model.get_activations(sample, layer)  # [seq, d_model]
            norms.append(act.norm(dim=-1).mean().item())
        return float(np.mean(norms))



    Algorithm (Section 2.1.3): PCA for analysis
    def compute_persona_pca(role_vectors: Tensor) -> tuple[Tensor, Tensor]:
        # role_vectors shape: [n_roles, d_model]
        standardized = role_vectors - role_vectors.mean(dim=0)  # subtract mean across roles
        # Use sklearn PCA or torch.linalg.svd
        pca = PCA(n_components=min(n_roles, d_model))
        components = pca.fit_transform(standardized)
        return pca.components_, pca.explained_variance_ratio_


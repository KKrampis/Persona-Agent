    ## 3. extraction/role_vectors.py — Role Vector Extraction

    Algorithm (Section 2.1.2):
    1. For each role r in 275 roles:
       a. Combine 5 system prompts × 240 extraction questions = 1200 (prompt, question) pairs
       b. Generate model responses for each pair (batch size as fits in GPU memory)
       c. Score each response with LLM judge:
          score = 0 (refused), 1 (no roleplay), 2 (somewhat), 3 (fully roleplay)
       d. Filter: collect responses where score == 2 OR score == 3
       e. If |responses with score==3| >= 10:
            fully_role_vector[r] = mean over response tokens of post-MLP activations at middle layer
       f. If |responses with score==2| >= 10:
            somewhat_role_vector[r] = mean over response tokens of post-MLP activations at middle layer
    2. For default Assistant:
       a. Generate 1200 rollouts with 4 normal system prompts + 1 no-system-prompt
       b. assistant_vector = mean over response tokens of post-MLP activations at middle layer

    Key implementation detail:
    - "Response tokens" = all tokens in the generated response (NOT prompt tokens)
    - Mean is taken over token positions, then over filtered rollouts
    - Activation layer = model.num_layers // 2  (middle layer)

